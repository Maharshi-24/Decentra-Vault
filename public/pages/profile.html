<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | DecentraVault</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-shield-halved"></i>
        <span>DecentraVault</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/index.html" class="nav-item">
          <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="/pages/api-keys.html" class="nav-item">
          <i class="fas fa-key"></i> API Keys
        </a>
        <a href="/pages/profile.html" class="nav-item active">
          <i class="fas fa-user-circle"></i> Profile
        </a>
      </nav>
      <div style="padding: 24px;">
        <a class="nav-item" onclick="logout()" style="cursor:pointer">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
    </div>

    <div class="main-content">
      <section id="profile-section">
        <div class="header">
          <h1>Profile</h1>
          <button id="editBtn" onclick="startEdit()" class="btn-primary" style="display:flex; align-items:center; gap:8px;">
            <i class="fas fa-pen"></i> Edit
          </button>
        </div>

        <div class="card" style="max-width: 560px;">

          <!-- Email (always read-only) -->
          <div style="margin-bottom: 24px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Email Address</label>
            <p id="profileEmail" style="font-size:15px; font-weight:600; color:var(--text-main);">
              <span class="skeleton" style="width:200px; height:18px;"></span>
            </p>
          </div>

          <!-- Name -->
          <div style="margin-bottom: 20px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Full Name</label>
            <p id="viewName" style="font-size:15px; color:var(--text-main);"><span class="skeleton" style="width:160px; height:18px;"></span></p>
            <input id="profileName" type="text" placeholder="e.g. John Doe" style="display:none; width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none;" onfocus="this.style.borderColor='#000'" onblur="this.style.borderColor='var(--border)'">
          </div>

          <!-- Age -->
          <div style="margin-bottom: 20px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Age</label>
            <p id="viewAge" style="font-size:15px; color:var(--text-main);"><span class="skeleton" style="width:60px; height:18px;"></span></p>
            <input id="profileAge" type="number" min="1" max="120" placeholder="e.g. 25" style="display:none; width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none;" onfocus="this.style.borderColor='#000'" onblur="this.style.borderColor='var(--border)'">
          </div>

          <!-- Gender -->
          <div style="margin-bottom: 8px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Gender</label>
            <p id="viewGender" style="font-size:15px; color:var(--text-main);"><span class="skeleton" style="width:80px; height:18px;"></span></p>
            <select id="profileGender" style="display:none; width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; background:white; cursor:pointer;" onfocus="this.style.borderColor='#000'" onblur="this.style.borderColor='var(--border)'">
              <option value="">Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Save / Cancel (hidden until edit mode) -->
          <div id="editActions" style="display:none; margin-top:24px; display:none; gap:12px;">
            <button onclick="saveProfile()" class="btn-primary" id="saveBtn" style="flex:1; padding:12px;">Save Changes</button>
            <button onclick="cancelEdit()" id="cancelBtn" style="flex:1; padding:12px; border:1px solid var(--border); background:white; border-radius:6px; font-size:14px; cursor:pointer;">Cancel</button>
          </div>

        </div>
      </section>
    </div>
  </div>
  <div id="toast" class="toast"><span id="toastMsg"></span></div>
  <script src="/js/app.js"></script>
  <script>
    let profileData = {};

    function setViewMode() {
      ["profileName","profileAge","profileGender"].forEach(id => document.getElementById(id).style.display = "none");
      document.getElementById("viewName").style.display   = "block";
      document.getElementById("viewAge").style.display    = "block";
      document.getElementById("viewGender").style.display = "block";
      document.getElementById("editActions").style.display = "none";
      document.getElementById("editBtn").style.display    = "flex";
    }

    function startEdit() {
      document.getElementById("profileName").value  = profileData.name   || "";
      document.getElementById("profileAge").value   = profileData.age    || "";
      document.getElementById("profileGender").value = profileData.gender || "";
      ["profileName","profileAge","profileGender"].forEach(id => document.getElementById(id).style.display = "block");
      document.getElementById("viewName").style.display   = "none";
      document.getElementById("viewAge").style.display    = "none";
      document.getElementById("viewGender").style.display = "none";
      document.getElementById("editActions").style.display = "flex";
      document.getElementById("editBtn").style.display    = "none";
    }

    function cancelEdit() { setViewMode(); }

    function applyView(d) {
      const genderLabel = { male: "Male", female: "Female", other: "Other" };
      document.getElementById("viewName").textContent   = d.name   || "—";
      document.getElementById("viewAge").textContent    = d.age    || "—";
      document.getElementById("viewGender").textContent = genderLabel[d.gender] || "—";
    }

    async function fetchMe() {
      try {
        const res = await fetch(`${API_URL}/auth/me`, { headers: { "Authorization": "Bearer " + currentToken } });
        const data = await res.json();
        if (res.ok) {
          profileData = data.developer;
          document.getElementById("profileEmail").textContent = profileData.email;
          applyView(profileData);
          setViewMode();
        } else { logout(); }
      } catch (err) { console.error("Profile fetch failed"); }
    }

    async function saveProfile() {
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.textContent = "Saving...";
      saveBtn.disabled = true;
      try {
        const body = {
          name:   document.getElementById("profileName").value.trim() || null,
          age:    document.getElementById("profileAge").value || null,
          gender: document.getElementById("profileGender").value || null
        };
        const res = await fetch(`${API_URL}/auth/profile`, {
          method: "PUT",
          headers: { "Authorization": "Bearer " + currentToken, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          const data = await res.json();
          profileData = { ...profileData, ...data.developer };
          applyView(profileData);
          setViewMode();
          showToast("Profile saved!");
        } else { showToast("Save failed", true); }
      } catch (err) { showToast("Save failed", true); }
      saveBtn.textContent = "Save Changes";
      saveBtn.disabled = false;
    }

    document.addEventListener("DOMContentLoaded", fetchMe);
  </script>
</body>
</html>
