<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | DecentraVault</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-shield-halved"></i>
        <span>DecentraVault</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/index.html" class="nav-item">
          <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="/pages/api-keys.html" class="nav-item">
          <i class="fas fa-key"></i> API Keys
        </a>
        <a href="/pages/profile.html" class="nav-item active">
          <i class="fas fa-user-circle"></i> Profile
        </a>
      </nav>
      <div style="padding: 24px;">
        <a class="nav-item" onclick="logout()" style="cursor:pointer">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
    </div>

    <div class="main-content">
      <section id="profile-section">
        <div class="header"><h1>Profile</h1></div>

        <div class="card" style="max-width: 560px;">
          <!-- Email (read-only) -->
          <div style="margin-bottom: 24px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Email Address</label>
            <p id="profileEmail" style="font-size:15px; font-weight:600; color:var(--text-main);">
              <span class="skeleton" style="width:200px; height:18px;"></span>
            </p>
          </div>

          <!-- Name -->
          <div style="margin-bottom: 20px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Full Name <span style="font-weight:400; text-transform:none; font-size:11px;">(optional)</span></label>
            <input id="profileName" type="text" placeholder="e.g. John Doe" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; transition: border 0.2s;" onfocus="this.style.borderColor='#000'" onblur="this.style.borderColor='var(--border)'">
          </div>

          <!-- Age -->
          <div style="margin-bottom: 20px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Age <span style="font-weight:400; text-transform:none; font-size:11px;">(optional)</span></label>
            <input id="profileAge" type="number" min="1" max="120" placeholder="e.g. 25" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; transition: border 0.2s;" onfocus="this.style.borderColor='#000'" onblur="this.style.borderColor='var(--border)'">
          </div>

          <!-- Gender -->
          <div style="margin-bottom: 28px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Gender <span style="font-weight:400; text-transform:none; font-size:11px;">(optional)</span></label>
            <select id="profileGender" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; background:white; cursor:pointer; transition: border 0.2s;" onfocus="this.style.borderColor='#000'" onblur="this.style.borderColor='var(--border)'">
              <option value="">Prefer not to say</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <button onclick="saveProfile()" class="btn-primary" style="width:100%; padding:12px;">Save Changes</button>
        </div>
      </section>
    </div>
  </div>
  <div id="toast" class="toast"><span id="toastMsg"></span></div>
  <script src="/js/app.js"></script>
  <script>
    async function fetchMe() {
      try {
        const res = await fetch(`${API_URL}/auth/me`, { headers: { "Authorization": "Bearer " + currentToken } });
        const data = await res.json();
        if (res.ok) {
          const d = data.developer;
          document.getElementById("profileEmail").textContent = d.email;
          if (d.name)   document.getElementById("profileName").value  = d.name;
          if (d.age)    document.getElementById("profileAge").value   = d.age;
          if (d.gender) document.getElementById("profileGender").value = d.gender;
        } else { logout(); }
      } catch (err) { console.error("Profile fetch failed"); }
    }

    async function saveProfile() {
      const btn = document.querySelector("button[onclick='saveProfile()']");
      btn.textContent = "Saving...";
      btn.disabled = true;
      try {
        const res = await fetch(`${API_URL}/auth/profile`, {
          method: "PUT",
          headers: { "Authorization": "Bearer " + currentToken, "Content-Type": "application/json" },
          body: JSON.stringify({
            name:   document.getElementById("profileName").value.trim() || null,
            age:    document.getElementById("profileAge").value || null,
            gender: document.getElementById("profileGender").value || null
          })
        });
        if (res.ok) { showToast("Profile saved!"); }
        else        { showToast("Save failed", true); }
      } catch (err) { showToast("Save failed", true); }
      btn.textContent = "Save Changes";
      btn.disabled = false;
    }

    document.addEventListener("DOMContentLoaded", fetchMe);
  </script>
</body>
</html>
