<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | DecentraVault</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-shield-halved"></i>
        <span>DecentraVault</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/index.html" class="nav-item active">
          <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="/pages/api-keys.html" class="nav-item">
          <i class="fas fa-key"></i> API Keys
        </a>
        <a href="/pages/profile.html" class="nav-item">
          <i class="fas fa-user-circle"></i> Profile
        </a>
      </nav>
      <div style="padding: 24px;">
        <a class="nav-item" onclick="logout()" style="cursor:pointer">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
    </div>

    <div class="main-content">
      <section id="dashboard-section">
        <div class="header"><h1>Dashboard</h1></div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:24px; margin-bottom: 40px;">
          <div class="card"><p style="color:var(--text-muted); font-size:12px; margin-bottom: 8px;">TOTAL FILES</p><p id="totalFiles" style="font-size:24px; font-weight:700;"><span class="skeleton" style="width:40px; height:28px;"></span></p></div>
          <div class="card"><p style="color:var(--text-muted); font-size:12px; margin-bottom: 8px;">API KEYS ACTIVE</p><p id="apiKeyCountDisplay" style="font-size:24px; font-weight:700;"><span class="skeleton" style="width:40px; height:28px;"></span></p></div>
          <div class="card"><p style="color:var(--text-muted); font-size:12px; margin-bottom: 8px;">USAGE</p><p style="font-size:24px; font-weight:700;">0 KB</p></div>
          <div class="card"><p style="color:var(--text-muted); font-size:12px; margin-bottom: 8px;">PLAN</p><p id="planDisplay" style="font-size:24px; font-weight:700;"><span class="skeleton" style="width:60px; height:28px;"></span></p></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom: 16px;">Welcome to DecentraVault</h3>
          <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6;">Start building decentralized applications using our SDK.</p>
        </div>
      </section>
    </div>
  </div>
  <div id="toast" class="toast"><span id="toastMsg"></span></div>
  <script src="/js/app.js"></script>
  <script>
    async function fetchStats() {
      try {
        const res = await fetch(`${API_URL}/auth/me`, { headers: { "Authorization": "Bearer " + currentToken } });
        const data = await res.json();
        if (res.ok) {
          document.getElementById("planDisplay").textContent = data.developer.plan.toUpperCase();
          document.getElementById("totalFiles").textContent = data.developer.file_count ?? 0;
          const keysRes = await fetch(`${API_URL}/keys`, { headers: { "Authorization": "Bearer " + currentToken } });
          const keysData = await keysRes.json();
          document.getElementById("apiKeyCountDisplay").textContent = keysRes.ok ? keysData.keys.length : 0;
        } else { logout(); }
      } catch (err) {
        document.getElementById("planDisplay").textContent = "FREE";
        document.getElementById("apiKeyCountDisplay").textContent = "0";
        document.getElementById("totalFiles").textContent = "0";
        console.error("Stats fetch failed");
      }
    }
    document.addEventListener("DOMContentLoaded", fetchStats);
  </script>
</body>
</html>
